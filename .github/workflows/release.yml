name: Release

# release-please automates the whole release cycle from conventional PR titles
# (squash-merged): it maintains a release PR with the version bump + CHANGELOG,
# and when that PR is merged this same workflow publishes to npm.
#
#   fix: …   → patch    feat: …  → minor    feat!: … / BREAKING CHANGE → major
#
# See RELEASING.md. Requires the NPM_TOKEN repo secret.

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push release PR branch, create tags + GitHub Releases
      pull-requests: write # open/update the release PR
      id-token: write # npm provenance attestation
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: node

      # Everything below runs only on the push that merges the release PR.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm
      - if: ${{ steps.release.outputs.release_created }}
        run: npm ci
      - if: ${{ steps.release.outputs.release_created }}
        run: npm run typecheck
      - if: ${{ steps.release.outputs.release_created }}
        run: npm test
      - name: Show tarball contents (audit trail)
        if: ${{ steps.release.outputs.release_created }}
        run: npm pack --dry-run
      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
