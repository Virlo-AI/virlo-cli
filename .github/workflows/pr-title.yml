name: PR title

# Enforces conventional-commit PR titles (fix:, feat:, feat!:, chore:, …).
# Squash-merge turns the title into the commit release-please reads, so a
# non-conforming title would ship silently — this check fails the PR instead.
#
# pull_request_target is safe here: the job never checks out or runs PR code;
# it only reads the title via the API.

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
