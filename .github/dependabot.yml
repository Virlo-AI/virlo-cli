version: 2
updates:
  # Keep pinned action SHAs current (dependabot updates the SHA + version comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # CI-only changes: never trigger a release.
      prefix: ci
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # Runtime dep bumps change the shipped bundle → "fix(deps): …" so
      # release-please cuts a patch release; devDependencies → "chore(deps): …"
      # (no release).
      prefix: fix
      prefix-development: chore
      include: scope
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # @types/node must track the MINIMUM supported Node major (see engines),
      # not the newest — bump it only when dropping support for a Node version.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
